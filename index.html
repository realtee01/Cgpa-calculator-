<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Portal | T/A CGPA Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s ease; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        
        .fade-in-down { animation: fadeInDown 0.6s ease-out forwards; }
        .fade-out { animation: fadeOut 0.3s ease-in forwards; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(10px); } }

        /* The T/A Custom Logo */
        .ta-logo-svg { height: 60px; width: 60px; filter: drop-shadow(0 4px 6px rgba(99, 102, 241, 0.3)); }
        .main-logo-svg { height: 32px; width: 32px; filter: drop-shadow(0 2px 4px rgba(99, 102, 241, 0.1)); }
    </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-slate-950 min-h-screen text-slate-900 dark:text-slate-100">

    <div id="welcome-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-indigo-600 dark:bg-slate-950 px-6 transition-colors duration-500">
        <div class="bg-white dark:bg-slate-900 p-10 md:p-16 rounded-3xl shadow-2xl max-w-lg w-full text-center fade-in-down relative border border-slate-100 dark:border-slate-800">
            
            <button id="login-theme-toggle" class="absolute top-6 right-6 p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:ring-2 hover:ring-indigo-400 transition-all">
                <svg id="login-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                <svg id="login-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            </button>

            <svg class="ta-logo-svg mx-auto mb-8" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M45 15L15 45H75L45 15Z" fill="#4F46E5"/><rect x="15" y="55" width="20" height="30" fill="#4F46E5"/><rect x="45" y="55" width="40" height="10" fill="#4F46E5"/><rect x="75" y="75" width="10" height="10" fill="#4F46E5"/><rect x="45" y="75" width="20" height="10" fill="#4F46E5"/></svg>

            <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2 leading-tight">T/A | CGPA Calculator</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-10 text-lg">Please enter your full name to access your academic portal.</p>
            
            <input type="text" id="name-input" placeholder="e.g. Tobiloba Adebayo" class="w-full p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-transparent dark:text-white mb-6 focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-600 outline-none transition-all text-center font-semibold text-lg placeholder:text-slate-300">
            
            <button id="enter-portal" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-5 rounded-2xl shadow-xl shadow-indigo-500/30 transition-all active:scale-95 text-lg">
                Enter My Portal
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col md:flex-row min-h-screen">
        
        <aside class="w-full md:w-80 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 p-8 flex flex-col h-screen sticky top-0 transition-all">
            <div class="flex items-center justify-between mb-8">
                <svg class="main-logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M45 15L15 45H75L45 15Z" fill="#4F46E5"/><rect x="15" y="55" width="20" height="30" fill="#4F46E5"/><rect x="45" y="55" width="40" height="10" fill="#4F46E5"/><rect x="75" y="75" width="10" height="10" fill="#4F46E5"/><rect x="45" y="75" width="20" height="10" fill="#4F46E5"/></svg>
                
                <button id="main-theme-toggle" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 transition-all">
                    <svg id="main-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                    <svg id="main-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                </button>
            </div>

            <div class="flex-1 space-y-6">
                <div>
                    <h1 class="text-slate-400 dark:text-slate-500 text-sm font-bold uppercase tracking-widest mb-1">Welcome,</h1>
                    <p id="display-name" class="text-2xl font-extrabold tracking-tight text-slate-800 dark:text-white truncate">Student</p>
                </div>
                
                <div class="bg-indigo-600 dark:bg-indigo-600/30 rounded-2xl p-6 text-white shadow-lg shadow-indigo-500/10 transition-colors">
                    <p class="text-indigo-100 text-xs font-bold uppercase mb-1">Cumulative GPA</p>
                    <div class="flex items-baseline gap-1">
                        <span id="final-gpa" class="text-5xl font-extrabold tracking-tight">0.00</span>
                        <span class="text-indigo-200 text-sm font-medium">/ 5.0</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800 transition-colors">
                        <p class="text-slate-500 dark:text-slate-400 text-xs font-semibold mb-1">Total Credit Units</p>
                        <p id="total-units" class="text-xl font-bold text-slate-800 dark:text-white">0</p>
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 transition-colors">
                <button id="calculate-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-xl shadow-indigo-500/20 active:scale-95">
                    Calculate Scores
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-12 overflow-y-auto">
            <div class="max-w-4xl mx-auto">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-bold text-slate-800 dark:text-white">Semester Course Tracker</h2>
                    <button id="add-course" class="bg-white dark:bg-slate-800 hover:bg-slate-50 text-slate-700 dark:text-slate-200 font-semibold py-2 px-4 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm transition-all active:scale-95">
                        + Add Row
                    </button>
                </div>

                <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-x-auto transition-colors">
                    <table class="w-full text-left min-w-[600px]">
                        <thead class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 text-xs uppercase font-bold">
                            <tr>
                                <th class="px-6 py-4">Course Name/Code</th>
                                <th class="px-6 py-4 text-center">Credit Unit</th>
                                <th class="px-6 py-4 text-center">Grade</th>
                                <th class="px-6 py-4"></th>
                            </tr>
                        </thead>
                        <tbody id="course-list" class="divide-y divide-slate-100 dark:divide-slate-800">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
