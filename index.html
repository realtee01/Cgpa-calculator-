<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T/A | Premium CGPA Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; background: #f8fafc; }
        .dark body { background: #020617; }
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-card { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }

        /* FIXED: Correct path to the image inside the public folder */
        .login-bg-overlay {
            background-image: url('public/login-bg.JPG');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        input[type="number"]::-webkit-inner-spin-button { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen text-slate-900 dark:text-slate-100 flex flex-col md:flex-row overflow-x-hidden transition-colors duration-500 relative">

    <div id="welcome-screen" 
         class="fixed inset-0 z-[100] flex items-center justify-center px-6 transition-all duration-1000 login-bg-overlay"
         style="background-image: url('public/login-bg.JPG');">
         
         <div class="absolute inset-0 bg-slate-900/50 dark:bg-black/80 pointer-events-none"></div>

        <div class="bg-white/95 dark:bg-slate-900/95 backdrop-blur-md p-10 md:p-16 rounded-[3.5rem] shadow-[0_32px_64px_-12px_rgba(0,0,0,0.5)] max-w-lg w-full text-center relative fade-in z-10 border border-white/20">
            <button id="login-theme-toggle" class="absolute top-8 right-8 p-3 rounded-2xl bg-slate-100/50 dark:bg-slate-800/50 text-slate-600 dark:text-slate-400">
                <span class="dark:hidden">🌙</span><span class="hidden dark:block">☀️</span>
            </button>
            <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl">
                <span class="text-3xl font-black text-white tracking-tighter">T/A</span>
            </div>
            <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-3 tracking-tight">Academic Portal</h2>
            <p class="text-slate-600 dark:text-slate-400 mb-10 text-lg font-medium">Elevate your academic tracking experience.</p>
            <input type="text" id="name-input" placeholder="Full Name" class="w-full p-5 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-white/50 dark:bg-slate-800/50 dark:text-white mb-6 focus:border-indigo-600 outline-none text-center font-bold text-xl transition-all">
            <button id="enter-portal" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold py-5 rounded-2xl shadow-2xl transition-all active:scale-[0.96] text-lg">
                Get Started
            </button>
        </div>
    </div>

    <header class="md:hidden glass-card border-b border-slate-200 dark:border-slate-800 p-6 sticky top-0 z-30">
        <div class="flex justify-between items-center mb-6">
            <span class="font-black text-indigo-600 text-xl tracking-tighter uppercase">T/A</span>
            <button id="mobile-theme-toggle" class="p-2.5 rounded-xl bg-slate-100/50 dark:bg-slate-800/50 text-slate-500"><span class="dark:hidden">🌙</span><span class="hidden dark:block">☀️</span></button>
        </div>
        <div class="mb-5 text-left">
            <p class="text-[10px] font-extrabold text-indigo-500 uppercase tracking-[0.2em] mb-1">Authenticated Student</p>
            <p id="display-name-mobile" class="text-2xl font-black text-slate-900 dark:text-white truncate">Student</p>
        </div>
        <div class="flex gap-4">
            <div class="flex-1 bg-indigo-600 p-5 rounded-[2rem] text-white shadow-lg"><p class="text-[10px] font-bold uppercase opacity-70 mb-1">CGPA</p><p id="final-gpa-mobile" class="text-3xl font-black">0.00</p></div>
            <div class="flex-1 glass-card p-5 rounded-[2rem]"><p class="text-[10px] font-bold uppercase text-slate-400 mb-1">Units</p><p id="total-units-mobile" class="text-3xl font-black">0</p></div>
        </div>
    </header>

    <aside class="hidden md:flex w-96 glass-card border-r border-slate-200 dark:border-slate-800 p-10 flex-col h-screen sticky top-0 z-40 transition-all">
        <div class="flex items-center justify-between mb-12">
            <div class="flex items-center gap-3"><div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-sm">T/A</div><span class="font-black text-slate-900 dark:text-white text-xl tracking-tighter">PORTAL</span></div>
            <button id="main-theme-toggle" class="p-3 rounded-2xl bg-slate-50 dark:bg-slate-800 text-slate-500"><span class="dark:hidden">🌙</span><span class="hidden dark:block">☀️</span></button>
        </div>
        <div class="flex-1 space-y-10 text-left">
            <div><p class="text-indigo-500 text-[10px] font-extrabold uppercase tracking-[0.3em] mb-2">Student Account</p><p id="display-name" class="text-3xl font-black text-slate-900 dark:text-white truncate leading-none">Student</p></div>
            <div class="bg-indigo-600 rounded-[3rem] p-10 text-white shadow-2xl relative overflow-hidden"><p class="text-indigo-100 text-[10px] font-black uppercase mb-3 tracking-[0.2em]">Cumulative GPA</p><div class="flex items-baseline gap-2"><span id="final-gpa" class="text-7xl font-black tracking-tighter">0.00</span><span class="text-indigo-200 text-lg font-bold">/ 5.0</span></div></div>
            <div class="glass-card p-8 rounded-[2.5rem]"><p class="text-slate-400 text-[10px] font-black uppercase mb-2 tracking-[0.2em]">Credits</p><p id="total-units" class="text-3xl font-black text-slate-800 dark:text-white tracking-tighter">0 <span class="text-sm font-bold text-slate-400 ml-1">UNITS</span></p></div>
        </div>
        <button id="calculate-btn-desktop" class="mt-8 w-full bg-slate-900 dark:bg-indigo-600 text-white font-extrabold py-5 rounded-[2rem] shadow-xl transition-all active:scale-[0.97] tracking-tight text-lg">Refresh Analysis</button>
    </aside>

    <main id="main-app" class="hidden flex-1 p-6 md:p-16 overflow-y-auto">
        <div class="max-w-4xl mx-auto fade-in">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-6 mb-12 text-left">
                <div><h2 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Course Registry</h2><p class="text-slate-500 font-medium mt-2">Add modules below to generate your report.</p></div>
                <button id="add-course" class="w-full sm:w-auto bg-white dark:bg-slate-800 text-indigo-600 font-black py-4 px-10 rounded-2xl border border-indigo-100 dark:border-slate-700 shadow-sm">+ Add Course</button>
            </div>
            <div class="glass-card rounded-[2.5rem] shadow-sm overflow-hidden">
                <div class="overflow-x-auto no-scrollbar">
                    <table class="w-full text-left min-w-[500px]">
                        <thead class="bg-slate-50/50 dark:bg-slate-800/30 border-b border-slate-200 dark:border-slate-800 text-[10px] uppercase font-black tracking-[0.2em] text-slate-400"><tr class="text-center"><th class="px-8 py-6 text-left">Module</th><th class="px-4 py-6">Units</th><th class="px-4 py-6">Grade</th><th class="px-8 py-6 w-20"></th></tr></thead>
                        <tbody id="course-list" class="divide-y divide-slate-100 dark:divide-slate-800 transition-all text-center"></tbody>
                    </table>
                </div>
            </div>
            <button id="calculate-btn-mobile" class="md:hidden w-full bg-indigo-600 text-white font-black py-5 rounded-[2rem] shadow-2xl mt-10 active:scale-[0.98]">Update Performance</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
