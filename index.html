<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Portal | CGPA Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s ease; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="bg-[#F1F5F9] dark:bg-slate-950 min-h-screen flex flex-col md:flex-row transition-colors duration-300">

    <aside class="w-full md:w-80 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 p-8 flex flex-col md:h-screen sticky top-0 z-10 transition-colors">
        <div class="flex items-center justify-between mb-10">
            <div class="h-10 w-10 bg-indigo-600 rounded-lg flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:ring-2 hover:ring-indigo-400 transition-all">
                <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            </button>
        </div>

        <div class="flex-1 space-y-8">
            <h1 class="text-xl font-bold text-slate-800 dark:text-white tracking-tight">Portal Dashboard</h1>
            
            <div class="bg-slate-900 dark:bg-indigo-600 rounded-2xl p-6 text-white shadow-xl shadow-indigo-500/20">
                <p class="text-indigo-200 dark:text-indigo-100 text-xs font-bold uppercase tracking-widest mb-1">Cumulative GPA</p>
                <div class="flex items-baseline gap-1">
                    <span id="final-gpa" class="text-5xl font-bold">0.00</span>
                    <span class="text-indigo-400 dark:text-indigo-200 text-sm">/ 5.0</span>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800 transition-colors">
                    <p class="text-slate-500 dark:text-slate-400 text-xs font-semibold mb-1 text-center">Credit Units</p>
                    <p id="total-units" class="text-2xl font-bold text-slate-800 dark:text-white text-center">0</p>
                </div>
                <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800 transition-colors">
                    <p class="text-slate-500 dark:text-slate-400 text-xs font-semibold mb-1 text-center">Academic Standing</p>
                    <p id="classification" class="text-md font-bold text-indigo-600 dark:text-indigo-400 text-center uppercase tracking-tighter">Enter Grades</p>
                </div>
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800">
            <button id="calculate-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-500/30">
                Update Scores
            </button>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-12 overflow-y-auto">
        <div class="max-w-4xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-bold text-slate-800 dark:text-white">Semester Courses</h2>
                <button id="add-course" class="bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-semibold py-2 px-4 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm transition-all">
                    + Add Course
                </button>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-x-auto">
                <table class="w-full text-left min-w-[600px]">
                    <thead class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 text-xs uppercase font-bold">
                        <tr>
                            <th class="px-6 py-4">Course Name</th>
                            <th class="px-6 py-4 text-center">Unit</th>
                            <th class="px-6 py-4 text-center">Grade</th>
                            <th class="px-6 py-4"></th>
                        </tr>
                    </thead>
                    <tbody id="course-list" class="divide-y divide-slate-100 dark:divide-slate-800">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
