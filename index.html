<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T/A | CGPA Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-slate-950 min-h-screen text-slate-900 dark:text-slate-100 flex flex-col md:flex-row overflow-x-hidden">

    <div id="welcome-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-indigo-600 dark:bg-slate-950 px-6 transition-all duration-500">
        <div class="bg-white dark:bg-slate-900 p-8 md:p-12 rounded-[2rem] shadow-2xl max-w-md w-full text-center border border-slate-100 dark:border-slate-800 relative fade-in">
            <div class="w-16 h-16 bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <span class="text-2xl font-black text-indigo-600">T/A</span>
            </div>
            <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white mb-2 tracking-tight">CGPA Calculator</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-8 text-sm px-4">Enter your name to unlock your academic dashboard.</p>
            <input type="text" id="name-input" placeholder="Full Name" class="w-full p-4 rounded-xl border-2 border-slate-50 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 dark:text-white mb-6 focus:border-indigo-600 outline-none text-center font-bold">
            <button id="enter-portal" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">
                Open Portal
            </button>
        </div>
    </div>

    <header class="md:hidden bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 p-4 sticky top-0 z-30">
        <div class="flex justify-between items-center mb-4">
            <span class="font-black text-indigo-600 text-lg">T/A PORTAL</span>
            <button id="mobile-theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800">
                <span class="dark:hidden text-lg">🌙</span><span class="hidden dark:block text-lg">☀️</span>
            </button>
        </div>
        <div class="flex gap-3">
            <div class="flex-1 bg-indigo-600 p-3 rounded-2xl text-white">
                <p class="text-[10px] font-bold uppercase opacity-80">CGPA</p>
                <p id="final-gpa-mobile" class="text-2xl font-black">0.00</p>
            </div>
            <div class="flex-1 bg-slate-100 dark:bg-slate-800 p-3 rounded-2xl border border-slate-200 dark:border-slate-700">
                <p class="text-[10px] font-bold uppercase text-slate-500">Units</p>
                <p id="total-units-mobile" class="text-2xl font-black">0</p>
            </div>
        </div>
    </header>

    <aside class="hidden md:flex w-80 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 p-8 flex-col h-screen sticky top-0 transition-colors">
        <div class="flex items-center justify-between mb-10">
            <span class="font-black text-indigo-600 text-xl tracking-tighter uppercase">T/A Portal</span>
            <button id="main-theme-toggle" class="p-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400">
                <span class="dark:hidden">🌙</span><span class="hidden dark:block">☀️</span>
            </button>
        </div>

        <div class="space-y-8">
            <div>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Welcome,</p>
                <p id="display-name" class="text-2xl font-extrabold text-slate-800 dark:text-white truncate">Student</p>
            </div>
            
            <div class="bg-indigo-600 rounded-[2rem] p-8 text-white shadow-xl shadow-indigo-500/20">
                <p class="text-indigo-100 text-xs font-bold uppercase mb-2">Cumulative GPA</p>
                <div class="flex items-baseline gap-1">
                    <span id="final-gpa" class="text-6xl font-black tracking-tighter">0.00</span>
                    <span class="text-indigo-200 text-sm font-medium">/ 5.0</span>
                </div>
            </div>

            <div class="bg-slate-50 dark:bg-slate-800/50 p-6 rounded-2xl border border-slate-100 dark:border-slate-800">
                <p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase mb-1">Total Credit Units</p>
                <p id="total-units" class="text-2xl font-black text-slate-800 dark:text-white">0</p>
            </div>
        </div>
        
        <button id="calculate-btn-desktop" class="mt-auto w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
            Calculate Scores
        </button>
    </aside>

    <main id="main-app" class="hidden flex-1 p-4 md:p-12">
        <div class="max-w-4xl mx-auto">
            <div class="flex items-center justify-between mb-6 md:mb-10">
                <div>
                    <h2 class="text-xl md:text-3xl font-black text-slate-900 dark:text-white tracking-tight">Semester Courses</h2>
                    <p class="hidden md:block text-slate-500 text-sm mt-1">Manage and calculate your academic performance.</p>
                </div>
                <button id="add-course" class="bg-indigo-600 md:bg-white md:dark:bg-slate-800 text-white md:text-indigo-600 font-bold py-2 px-5 md:px-8 rounded-xl md:border md:border-indigo-100 dark:border-slate-700 shadow-sm transition-all active:scale-95 text-sm">
                    + Add
                </button>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
                <div class="overflow-x-auto no-scrollbar">
                    <table class="w-full text-left min-w-[320px]">
                        <thead class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800">
                            <tr class="text-[10px] uppercase font-black tracking-widest text-slate-400">
                                <th class="px-4 md:px-6 py-4">Course</th>
                                <th class="px-2 py-4 text-center">Unit</th>
                                <th class="px-2 py-4 text-center">Grade</th>
                                <th class="px-4 py-4 w-10"></th>
                            </tr>
                        </thead>
                        <tbody id="course-list" class="divide-y divide-slate-50 dark:divide-slate-800">
                            </tbody>
                    </table>
                </div>
            </div>

            <button id="calculate-btn-mobile" class="md:hidden w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-indigo-500/20 mt-6 active:scale-[0.98]">
                Calculate GPA
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
